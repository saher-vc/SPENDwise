<style>
        body {
            background-color: #FFFFFF;

        }
        .reveal-up {
            animation: revealUp 0.8s cubic-bezier(0.2, 0, 0.2, 1) forwards;

        }
        .pulse-soft {
            animation: pulseSoft 2.5s infinite ease-in-out;
        }
        @keyframes revealUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {

            100% { opacity: 1; }

            50% { opacity: 1; transform: scale(1.05); }
        }

            background: radial-gradient(circle at 50% 50%, rgba(99, 249, 232, 0.08) 0%, rgba(255, 255, 255, 0) 70%);

            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(0, 196, 180, 0.2));
            animation: bounceEmoji 2s infinite ease-in-out;
        }
        @keyframes bounceEmoji {

<body class="flex flex-col items-center justify-center min-h-screen relative font-body-md text-on-background">
<!-- Subtle atmospheric background -->
<div class="fixed inset-0 glass-background pointer-events-none"></div>
<!-- Main Content Container -->
<main class="z-10 flex flex-col items-center text-center px-container-margin w-full max-w-md" id="splash-container">
<!-- Logo Section -->
<div class="reveal-up mb-xs">
<h1 class="font-display-lg text-display-lg text-primary flex items-center gap-2">
                SpendWise <span class="money-emoji">💰</span>
</h1>
</div>
<!-- Tagline -->
<div class="reveal-up delay-200" style="animation-delay: 0.2s;">
<p class="font-body-lg text-body-lg text-on-surface-variant tracking-tight">
                Your smart money sidekick <span class="text-tertiary">✨</span>
</p>
</div>
</main>
<!-- Interactive Tap Area -->
<div class="fixed bottom-xl w-full flex flex-col items-center cursor-pointer select-none" id="tap-target">
<div class="fade-in mb-sm" style="animation-delay: 1s;">
<div class="w-12 h-12 rounded-full border-2 border-primary/20 flex items-center justify-center pulse-soft">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'wght' 300;">keyboard_arrow_down</span>
</div>
</div>
<div class="fade-in" style="animation-delay: 1.2s;">
<button class="font-label-md text-label-md text-outline uppercase tracking-widest hover:text-primary transition-colors duration-300">
                Tap to continue
            </button>
</div>
</div>
<!-- Decorative floating elements (Minimalist finance abstract) -->
<div class="absolute top-20 left-[10%] opacity-20 hidden md:block fade-in" style="animation-delay: 0.5s;">
<div class="w-32 h-32 rounded-3xl bg-primary-container blur-3xl"></div>
</div>
<div class="absolute bottom-40 right-[15%] opacity-20 hidden md:block fade-in" style="animation-delay: 0.8s;">
<div class="w-48 h-48 rounded-full bg-tertiary-container blur-3xl"></div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const tapTarget = document.getElementById('tap-target');
            const mainContainer = document.getElementById('splash-container');
            
            // Interaction logic
            const proceed = () => {
                // Haptic-like visual feedback
                mainContainer.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease';
                mainContainer.style.transform = 'scale(0.95)';
                mainContainer.style.opacity = '0';
                tapTarget.style.opacity = '0';
                tapTarget.style.transform = 'translateY(20px)';
                
                // Simulate transition to next screen
                setTimeout(() => {
                    // This is where the navigation logic would go
                    console.log('Navigating to Onboarding...');
                    // For demo purposes, we refresh or reset if needed
                    // window.location.href = '/onboarding';
                }, 400);
            };

            // Touch and Click events
            tapTarget.addEventListener('click', proceed);
            document.body.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') proceed();
            });

            // Gentle parallax movement based on mouse
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                mainContainer.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
