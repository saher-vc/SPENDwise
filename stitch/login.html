                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col">
<!-- Top AppBar (Simplified for Auth) -->
<header class="bg-surface dark:bg-background flex justify-between items-center px-container-margin py-xs w-full w-full

">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">SpendWise</div>
<div class="text-on-surface-variant font-label-md text-label-md hidden md:block">Get your bread right 💸</div>
</header>
<main class="flex-grow flex items-center justify-center px-container-margin py-lg">
<div class="w-full max-w-md">
<!-- Branding Section -->
<div class="text-center mb-lg">
<div class="flex justify-center mb-sm">
<div class="w-16 h-16 bg-primary-container rounded-3xl flex items-center justify-center shadow-lg transform -rotate-6">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">payments</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-xs">Secure the bag.</h1>
<p class="font-body-md text-body-md text-on-surface-variant">No cap, the best way to track your spending.</p>
</div>
<!-- Tab Switcher -->
<div class="bg-surface-container-low rounded-full p-1.5 flex mb-lg relative overflow-hidden">
<button class="flex-1 py-3 px-4 rounded-full font-label-md text-label-md z-10 tab-transition text-primary font-bold bg-white shadow-sm" id="loginTabBtn" onclick="switchTab('login')">
                    Log in
                </button>
<button class="flex-1 py-3 px-4 rounded-full font-label-md text-label-md z-10 tab-transition text-on-surface-variant" id="signupTabBtn" onclick="switchTab('signup')">
                    Sign up
                </button>
</div>
<!-- Forms Container -->
<div class="bg-white rounded-[32px] p-md shadow-[0px_10px_30px_rgba(0,0,0,0.04)] border border-surface-container">
<!-- Login Form -->
<form class="space-y-sm block" id="loginForm">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-base">Email address</label>
<input class="w-full px-md py-4 rounded-[20px] bg-surface border-none focus:ring-2 focus:ring-primary-container text-body-md transition-all outline-none" placeholder="you@maincharacter.com" required="" type="email"/>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center px-base">
<label class="font-label-sm text-label-sm text-on-surface">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
</div>
<input class="w-full px-md py-4 rounded-[20px] bg-surface border-none focus:ring-2 focus:ring-primary-container text-body-md transition-all outline-none" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full py-4 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-full glow-button active:scale-95 transition-all mt-md" type="submit">
                        Log in
                    </button>
</form>
<!-- Signup Form (Hidden by default) -->
<form class="space-y-sm hidden" id="signupForm">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-base">Full name</label>
<input class="w-full px-md py-4 rounded-[20px] bg-surface border-none focus:ring-2 focus:ring-primary-container text-body-md transition-all outline-none" placeholder="Alex Finance-Bro" required="" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-base">Email address</label>
<input class="w-full px-md py-4 rounded-[20px] bg-surface border-none focus:ring-2 focus:ring-primary-container text-body-md transition-all outline-none" placeholder="alex@vibecheck.io" required="" type="email"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-base">Password</label>
<input class="w-full px-md py-4 rounded-[20px] bg-surface border-none focus:ring-2 focus:ring-primary-container text-body-md transition-all outline-none" id="signupPassword" oninput="checkStrength(this.value)" placeholder="Strong vibes only" required="" type="password"/>
<!-- Strength Indicator -->
<div class="flex gap-1 mt-2 px-base">
<div class="h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors" id="strength-1"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors" id="strength-2"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors" id="strength-3"></div>
</div>
<p class="text-[10px] font-label-sm text-on-surface-variant mt-1 ml-base" id="strength-text">Password strength: weak af</p>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-base">Confirm password</label>
<input class="w-full px-md py-4 rounded-[20px] bg-surface border-none focus:ring-2 focus:ring-primary-container text-body-md transition-all outline-none" placeholder="One more time" required="" type="password"/>
</div>
<button class="w-full py-4 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-full glow-button active:scale-95 transition-all mt-md" type="submit">
                        Sign up
                    </button>
</form>
<div class="mt-lg">
<div class="relative flex items-center justify-center mb-md">
<div class="border-t border-surface-container-highest w-full absolute"></div>
<span class="bg-white px-4 font-label-sm text-label-sm text-on-surface-variant relative z-10">Or continue with</span>
</div>
<button class="w-full flex items-center justify-center gap-3 py-4 rounded-full border border-surface-container bg-white hover:bg-surface-container-low transition-colors active:scale-95">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDP6zgJ_w1nWvmm9xIz3R7mgvGoL61iuNdR0fWHC-TKaVwPo-14lkTvbiuJc8VVYQ_wAGZ4alO5v8ufGxVdG21AUCRJ3LRCXcdWmnCDk6VHIy5I5t-aMZjjePbYF-E2vAA1eEfmZ7ldRtHcqacLrskPIYMyAyvHWTjp9MIsMUw7WWoYOX8LLs0oNeFwSOa7oYDQfinyzNN7Tk0VqdAi5kQSNT-8A_D4FJHrwDEYw9JoZN_BMqlYp1tn8NjOy2197BamaMaG6CKsPaHf"/>
<span class="font-label-md text-label-md text-on-surface">Sign up with Google</span>
</button>
</div>
</div>
<p class="text-center mt-lg font-body-md text-body-md text-on-surface-variant">
                By joining, you agree to our <a class="text-primary font-bold underline" href="#">terms</a>. Fr, fr.
            </p>
</div>
</main>
<!-- Visual Accents (Background atmosphere) -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary-container/10 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-tertiary-container/10 blur-[100px] rounded-full -translate-x-1/2 translate-y-1/2"></div>
<script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginBtn = document.getElementById('loginTabBtn');
            const signupBtn = document.getElementById('signupTabBtn');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginBtn.classList.add('bg-white', 'shadow-sm', 'text-primary', 'font-bold');
                loginBtn.classList.remove('text-on-surface-variant');
                signupBtn.classList.remove('bg-white', 'shadow-sm', 'text-primary', 'font-bold');
                signupBtn.classList.add('text-on-surface-variant');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                signupBtn.classList.add('bg-white', 'shadow-sm', 'text-primary', 'font-bold');
                signupBtn.classList.remove('text-on-surface-variant');
                loginBtn.classList.remove('bg-white', 'shadow-sm', 'text-primary', 'font-bold');
                loginBtn.classList.add('text-on-surface-variant');
            }
        }

        function checkStrength(val) {
            const s1 = document.getElementById('strength-1');
            const s2 = document.getElementById('strength-2');
            const s3 = document.getElementById('strength-3');
            const text = document.getElementById('strength-text');

            if (val.length === 0) {
                s1.className = 'h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors';
                s2.className = 'h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors';
                s3.className = 'h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors';
                text.innerText = 'Password strength: weak af';
            } else if (val.length < 6) {
                s1.className = 'h-1.5 flex-1 rounded-full bg-error transition-colors';
                s2.className = 'h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors';
                s3.className = 'h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors';
                text.innerText = 'Password strength: weak af';
            } else if (val.length < 10) {
                s1.className = 'h-1.5 flex-1 rounded-full bg-secondary-container transition-colors';
                s2.className = 'h-1.5 flex-1 rounded-full bg-secondary-container transition-colors';
                s3.className = 'h-1.5 flex-1 rounded-full bg-surface-container-highest transition-colors';
                text.innerText = 'Password strength: valid';
            } else {
                s1.className = 'h-1.5 flex-1 rounded-full bg-tertiary-container transition-colors';
                s2.className = 'h-1.5 flex-1 rounded-full bg-tertiary-container transition-colors';
                s3.className = 'h-1.5 flex-1 rounded-full bg-tertiary-container transition-colors';
                text.innerText = 'Password strength: god tier ⚡️';
            }
        }
    </script>
</body></html>
